<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trade Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D; --ink-2:#20305A;
    --paper:#F3F4EF; --paper-2:#FFFFFF;
    --line:#DEDCD0; --line-soft:#EAE8DC;
    --seal:#B8863A; --seal-dark:#8C6427; --seal-soft:#F1E4CC;
    --verified:#1F6E52; --verified-soft:#DEEEE6;
    --review:#A66A1E; --review-soft:#F3E6D2;
    --block:#A63A3A; --block-soft:#F3DEDE;
    --ink-soft:#5B6472;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background:var(--paper); font-family:'IBM Plex Sans', sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased; }
  ::selection{ background:var(--seal-soft); }
  h1,h2,h3{ font-family:'Source Serif 4', serif; margin:0; }
  a{ text-decoration:none; color:inherit; cursor:pointer; }

  /* ============ TOP NAVBAR (app shell) ============ */
  .topnav{
    height:60px; background:var(--ink); display:flex; align-items:center;
    padding:0 22px; gap:20px; position:sticky; top:0; z-index:20;
  }
  .topnav .brand{ display:flex; align-items:center; gap:9px; margin-right:8px; }
  .topnav .mark{ width:26px;height:26px;border-radius:50%; border:1.5px solid var(--seal); display:flex;align-items:center;justify-content:center; font-family:'Source Serif 4',serif; font-weight:700; color:var(--seal); font-size:12px; }
  .topnav .brand span{ font-family:'Source Serif 4', serif; font-size:16px; color:#F4F1E6; }
  .topnav nav{ display:flex; gap:2px; flex:1; }
  .topnav nav a{ color:#B7C1D6; font-size:13.5px; font-weight:500; padding:9px 14px; border-radius:7px; }
  .topnav nav a:hover{ background:rgba(255,255,255,0.06); color:#F4F1E6; }
  .topnav nav a.on{ background:rgba(184,134,58,0.18); color:#F4F1E6; }
  .topnav .org{ font-size:12.5px; color:#B7C1D6; display:flex; align-items:center; gap:8px; }
  .topnav .role-chip{ font-size:10.5px; font-weight:700; color:var(--seal-dark); background:var(--seal-soft); padding:2px 8px; border-radius:20px; letter-spacing:.03em; }
  .avatar-wrap{ position:relative; }
  .avatar{ width:30px;height:30px;border-radius:50%; background:var(--ink-2); color:#F4F1E6; display:flex;align-items:center;justify-content:center; font-size:12px; font-weight:600; border:1px solid #3A4A70; margin-left:6px; cursor:pointer; }
  .user-menu{
    display:none; position:absolute; right:0; top:calc(100% + 10px); background:#fff; color:var(--ink);
    border:1px solid var(--line); border-radius:10px; min-width:200px; box-shadow:0 8px 24px rgba(20,33,61,0.12);
    padding:6px; z-index:40;
  }
  .user-menu.open{ display:block; }
  .user-menu .um-head{ padding:10px 12px 12px; border-bottom:1px solid var(--line-soft); margin-bottom:6px; }
  .user-menu .um-head .n{ font-size:13.5px; font-weight:600; }
  .user-menu .um-head .r{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .user-menu a{ display:block; font-size:13px; padding:9px 12px; border-radius:6px; color:var(--ink-soft); font-weight:500; }
  .user-menu a:hover{ background:var(--line-soft); color:var(--ink); }

  /* ============ APP BODY: sidebar + content ============ */
  .shell{ display:flex; align-items:stretch; }
  .sidebar{
    width:222px; flex-shrink:0; background:#FAFAF6; border-right:1px solid var(--line-soft);
    min-height:calc(100vh - 60px); padding:20px 12px 0; position:sticky; top:60px;
    display:flex; flex-direction:column; height:calc(100vh - 60px);
  }
  .sidebar-nav{ flex:1; overflow-y:auto; }
  .sidebar .grp-label{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:#9A9384; font-weight:700; margin:16px 8px 8px; }
  .sidebar .grp-label:first-child{ margin-top:2px; }
  .sidebar a.nav-link{ display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--ink-soft); padding:9px 10px; border-radius:7px; margin-bottom:2px; font-weight:500; }
  .sidebar a.nav-link:hover{ background:var(--line-soft); }
  .sidebar a.nav-link.on{ background:#fff; color:var(--ink); font-weight:600; box-shadow:0 0 0 1px var(--line); }
  .sidebar a.nav-link .dot{ width:6px;height:6px;border-radius:50%; background:var(--line); flex-shrink:0; }
  .sidebar a.nav-link.on .dot{ background:var(--seal); }
  .sidebar-footer{
    display:flex; align-items:center; gap:10px; padding:14px 10px; border-top:1px solid var(--line-soft);
  }
  .sidebar-footer .avatar{ margin-left:0; }
  .sidebar-footer .info{ flex:1; min-width:0; }
  .sidebar-footer .info .n{ font-size:12.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sidebar-footer .info .r{ font-size:11px; color:var(--ink-soft); }
  .sidebar-footer .logout{ font-size:11.5px; font-weight:600; color:var(--ink-soft); padding:6px 8px; border-radius:6px; }
  .sidebar-footer .logout:hover{ background:var(--line-soft); color:var(--block); }

  .content{ flex:1; padding:30px 40px 60px; max-width:1100px; }
  .crumbs{ font-size:12px; color:var(--ink-soft); margin-bottom:8px; }
  .crumbs b{ color:var(--ink); }
  .crumbs a:hover{ text-decoration:underline; }
  .page-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; gap:20px; flex-wrap:wrap; }
  .page-head h1{ font-size:26px; font-weight:600; }
  .page-head p{ margin:6px 0 0; color:var(--ink-soft); font-size:14px; max-width:520px; }
  .btn{ font-family:'IBM Plex Sans', sans-serif; font-size:13.5px; font-weight:600; padding:9px 16px; border-radius:7px; border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer; display:inline-block; }
  .btn:hover{ border-color:var(--ink-2); }
  .btn.primary{ background:var(--ink); color:#F4F1E6; border-color:var(--ink); }
  .btn.primary:hover{ background:var(--ink-2); }
  .btn.small{ padding:6px 12px; font-size:12.5px; }

  .tabbar{ display:flex; gap:2px; border-bottom:1px solid var(--line); margin-bottom:24px; }
  .tabbar a{ font-size:13.5px; font-weight:500; color:var(--ink-soft); padding:10px 4px; margin-right:22px; border-bottom:2px solid transparent; }
  .tabbar a.on{ color:var(--ink); font-weight:600; border-bottom-color:var(--seal); }

  .card{ border:1px solid var(--line); border-radius:10px; padding:20px; background:#fff; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:0 18px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .field input, .field select{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:7px; font-family:'IBM Plex Sans', sans-serif; font-size:14px; background:#fff; color:var(--ink); }
  .muted{ color:var(--ink-soft); font-size:13px; }
  .divider{ height:1px; background:var(--line-soft); margin:20px 0; }

  .badge{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px; }
  .badge.verified{ background:var(--verified-soft); color:var(--verified); }
  .badge.review{ background:var(--review-soft); color:var(--review); }
  .badge.block{ background:var(--block-soft); color:var(--block); }
  .badge.neutral{ background:var(--line-soft); color:var(--ink-soft); }

  .stamp{ width:64px; height:64px; border-radius:50%; border:2px solid var(--seal); display:flex; align-items:center; justify-content:center; flex-shrink:0; transform:rotate(-7deg); position:relative; background:var(--seal-soft); }
  .stamp::before{ content:''; position:absolute; inset:5px; border:1px dashed var(--seal-dark); border-radius:50%; opacity:.55; }
  .stamp span{ font-family:'Source Serif 4', serif; font-weight:700; font-size:9.5px; color:var(--seal-dark); text-align:center; line-height:1.15; letter-spacing:.03em; text-transform:uppercase; }
  .stamp.verified{ border-color:var(--verified); background:var(--verified-soft); }
  .stamp.verified::before{ border-color:var(--verified); }
  .stamp.verified span{ color:var(--verified); }

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line); }
  td{ padding:11px 10px; border-bottom:1px solid var(--line-soft); }
  tr.clickable:hover td{ background:#FAFAF6; cursor:pointer; }
  .mono{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; }

  .kv{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line-soft); font-size:13.5px; }
  .kv span:first-child{ color:var(--ink-soft); }
  .doc-row{ display:flex; align-items:center; justify-content:space-between; padding:13px 4px; border-bottom:1px solid var(--line-soft); }
  .doc-row .name{ font-size:13.5px; font-weight:500; }
  .doc-row .meta{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .upload-btn{ font-size:12px; font-weight:600; color:var(--seal-dark); border:1px solid var(--seal); background:var(--seal-soft); padding:6px 12px; border-radius:6px; cursor:pointer; }

  .timeline{ display:flex; justify-content:space-between; position:relative; margin:26px 0 6px; }
  .timeline::before{ content:''; position:absolute; top:14px; left:0; right:0; height:2px; background:var(--line); z-index:0; }
  .tl-step{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; }
  .tl-dot{ width:28px; height:28px; border-radius:50%; background:#fff; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); }
  .tl-step.done .tl-dot{ background:var(--verified); border-color:var(--verified); color:#fff; }
  .tl-step.active .tl-dot{ background:var(--seal); border-color:var(--seal); color:#fff; }
  .tl-step .tl-label{ font-size:11.5px; text-align:center; color:var(--ink-soft); max-width:90px; }
  .tl-step.done .tl-label, .tl-step.active .tl-label{ color:var(--ink); font-weight:600; }

  /* ============ SIGNUP WIZARD & LOGIN (no app shell) ============ */
  .wizard-wrap{ min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px 60px; }
  .wizard-brand{ display:flex; align-items:center; gap:9px; margin-bottom:26px; }
  .wizard-brand .mark{ width:30px;height:30px;border-radius:50%; border:1.5px solid var(--seal); display:flex;align-items:center;justify-content:center; font-family:'Source Serif 4',serif; font-weight:700; color:var(--seal); font-size:14px; }
  .wizard-brand span{ font-family:'Source Serif 4', serif; font-size:19px; }
  .stepper{ display:flex; align-items:center; gap:0; margin-bottom:34px; width:100%; max-width:520px; }
  .stepper .s{ display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; position:relative; }
  .stepper .s:not(:last-child)::after{ content:''; position:absolute; top:13px; left:calc(50% + 20px); right:calc(-50% + 20px); height:2px; background:var(--line); }
  .stepper .s.done:not(:last-child)::after{ background:var(--verified); }
  .stepper .dot{ width:26px;height:26px;border-radius:50%; border:2px solid var(--line); background:#fff; display:flex;align-items:center;justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); z-index:1; }
  .stepper .s.done .dot{ background:var(--verified); border-color:var(--verified); color:#fff; }
  .stepper .s.active .dot{ background:var(--seal); border-color:var(--seal); color:#fff; }
  .stepper .lbl{ font-size:11px; color:var(--ink-soft); text-align:center; }
  .stepper .s.active .lbl, .stepper .s.done .lbl{ color:var(--ink); font-weight:600; }
  .wizard-card{ width:100%; max-width:640px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:32px 34px; }
  .wizard-card h2{ font-size:21px; margin-bottom:6px; }
  .wizard-card > .muted{ margin-bottom:22px; }
  .wizard-actions{ display:flex; justify-content:space-between; margin-top:26px; width:100%; max-width:640px; }

  .login-card{ width:100%; max-width:380px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:32px; margin-top:60px; text-align:left; }
  .login-card h2{ text-align:center; margin-bottom:18px; }

  /* ============ MODAL ============ */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,33,61,0.45); display:flex; align-items:center; justify-content:center; z-index:100;
  }
  .modal-card{ width:100%; max-width:420px; background:#fff; border-radius:12px; padding:26px 26px 22px; box-shadow:0 20px 50px rgba(20,33,61,0.25); }
  .modal-card h3{ font-size:18px; margin-bottom:4px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
</style>
</head>
<body>
<div id="root"></div>
<div id="modalRoot"></div>

<script>
/* -------------------- Identities per role -------------------- */
const ROLES = {
  exporter: { label:'Exporter Admin', name:'Priya Shah', initials:'PS', email:'priya@medcurepharma.example', org:'MedCure Pharma Exports' },
  buyer:    { label:'Buyer', name:'Kenji Watanabe', initials:'KW', email:'kenji@osakapharma.example', org:'Osaka Pharma Distribution K.K.' },
  bank:     { label:'Bank Reviewer', name:'Sana Iyer', initials:'SI', email:'sana.iyer@icicibank.example', org:'ICICI Bank — Corporate Banking' },
};
let CURRENT_ROLE = 'exporter';
function currentUser(){ return ROLES[CURRENT_ROLE]; }

let TEAM_MEMBERS = [
  { name:'Priya Shah', email:'priya@medcurepharma.example', role:'Exporter Admin', status:'Active' },
  { name:'Arjun Nair', email:'arjun@medcurepharma.example', role:'Docs & Compliance', status:'Active' },
];

const TRANSACTIONS = [
  { id:'T-1042', ref:'MUFGJP2026LC1187', industry:'Pharma', buyer:'Osaka Pharma Distribution K.K.', value:'USD 80,000', status:'review', statusLabel:'Docs under review' },
  { id:'T-0942', ref:'SMBCJP2026LC0942', industry:'Textile', buyer:'Kyoto Textile Trading Co.', value:'USD 46,500', status:'verified', statusLabel:'Accepted' },
  { id:'T-0711', ref:'MUFGJP2025LC0711', industry:'Pharma', buyer:'Osaka Pharma Distribution K.K.', value:'USD 80,000', status:'neutral', statusLabel:'Closed' },
];

/* -------------------- Router -------------------- */
let path = '/signup/account';
function navigate(p){ closeUserMenu(); path = p; render(); window.scrollTo({top:0}); }
window.navigate = navigate;
function logout(){ navigate('/login'); }

/* -------------------- User menu (top-right dropdown) -------------------- */
function toggleUserMenu(e){
  e.stopPropagation();
  const el = document.getElementById('userMenu');
  if(el) el.classList.toggle('open');
}
function closeUserMenu(){
  const el = document.getElementById('userMenu');
  if(el) el.classList.remove('open');
}
document.addEventListener('click', closeUserMenu);

/* -------------------- Invite modal -------------------- */
function openInviteModal(){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeInviteModal()">
      <div class="modal-card">
        <h3>Invite a teammate</h3>
        <p class="muted">They'll get access once your organization's verification clears.</p>
        <div class="field" style="margin-top:16px;"><label>Email</label><input id="inviteEmail" placeholder="teammate@company.com"></div>
        <div class="field"><label>Role</label>
          <select id="inviteRole">
            <option>Docs & Compliance</option>
            <option>Finance</option>
            <option>Viewer</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeInviteModal()">Cancel</button>
          <button class="btn primary" onclick="sendInvite()">Send invite</button>
        </div>
      </div>
    </div>`;
}
function closeInviteModal(){ document.getElementById('modalRoot').innerHTML = ''; }
function sendInvite(){
  const email = document.getElementById('inviteEmail').value.trim();
  const role = document.getElementById('inviteRole').value;
  if(!email){ document.getElementById('inviteEmail').style.borderColor = 'var(--block)'; return; }
  TEAM_MEMBERS.push({ name:'—', email, role, status:'Invited' });
  closeInviteModal();
  render();
}

/* -------------------- Shell chrome (logged-in app) -------------------- */
function navItemsForRole(){
  const base = [ ['/dashboard','Dashboard'], ['/transactions','Transactions'] ];
  if(CURRENT_ROLE === 'bank') base.push(['/compliance','Compliance']);
  base.push(['/team','Team']);
  return base;
}

function topNav(activeSection){
  const u = currentUser();
  const items = navItemsForRole();
  return `
  <div class="topnav">
    <a class="brand" onclick="navigate('/dashboard')"><div class="mark">T</div><span>Trade Ledger</span></a>
    <nav>${items.map(([p,l])=>`<a class="${activeSection===p?'on':''}" onclick="navigate('${p}')">${l}</a>`).join('')}</nav>
    <div class="org">${u.org} <span class="role-chip">${u.label}</span></div>
    <div class="avatar-wrap">
      <div class="avatar" onclick="toggleUserMenu(event)">${u.initials}</div>
      <div class="user-menu" id="userMenu" onclick="event.stopPropagation()">
        <div class="um-head"><div class="n">${u.name}</div><div class="r">${u.email}</div></div>
        <a onclick="navigate('/profile')">Profile</a>
        <a onclick="logout()">Log out</a>
      </div>
    </div>
  </div>`;
}

function sidebar(active, txId){
  const u = currentUser();
  const showNewTx = CURRENT_ROLE === 'exporter';
  return `
  <div class="sidebar">
    <div class="sidebar-nav">
      <div class="grp-label">Workspace</div>
      <a class="nav-link ${active==='dashboard'?'on':''}" onclick="navigate('/dashboard')"><span class="dot"></span>Dashboard</a>
      <a class="nav-link ${active==='transactions'?'on':''}" onclick="navigate('/transactions')"><span class="dot"></span>Transactions</a>
      ${showNewTx ? `<a class="nav-link ${active==='new'?'on':''}" onclick="navigate('/transactions/new')"><span class="dot"></span>New transaction</a>` : ''}
      ${CURRENT_ROLE==='bank' ? `<a class="nav-link ${active==='compliance'?'on':''}" onclick="navigate('/compliance')"><span class="dot"></span>Compliance</a>` : ''}
      <div class="grp-label">Organization</div>
      <a class="nav-link ${active==='team'?'on':''}" onclick="navigate('/team')"><span class="dot"></span>Team</a>
      ${txId ? `
      <div class="grp-label">Current transaction</div>
      <a class="nav-link mono" style="font-size:11.5px;" onclick="navigate('/transactions/${txId}/overview')">${txId}</a>
      ` : ''}
    </div>
    <div class="sidebar-footer">
      <div class="avatar">${u.initials}</div>
      <div class="info"><div class="n">${u.name}</div><div class="r">${u.label}</div></div>
      <a class="logout" onclick="logout()">Log out</a>
    </div>
  </div>`;
}

function shell(active, inner, txId){
  const section = (active==='team') ? '/team' : (active==='compliance') ? '/compliance' : (active==='transactions'||active==='new'||active==='txdetail') ? '/transactions' : '/dashboard';
  return `${topNav(section)}
  <div class="shell">
    ${sidebar(active, txId)}
    <div class="content">${inner}</div>
  </div>`;
}

/* -------------------- Signup wizard -------------------- */
const wizardSteps = ['account','verify','team'];
const wizardLabels = {account:'Account', verify:'Verify', team:'Team'};

function wizardChrome(step, bodyHtml, title, sub){
  const idx = wizardSteps.indexOf(step);
  const stepperHtml = wizardSteps.map((s,i)=>{
    const cls = i<idx?'done':(i===idx?'active':'');
    return `<div class="s ${cls}"><div class="dot">${i<idx?'✓':i+1}</div><div class="lbl">${wizardLabels[s]}</div></div>`;
  }).join('');
  const prevIdx = idx-1, nextIdx = idx+1;
  const prevPath = prevIdx>=0 ? `/signup/${wizardSteps[prevIdx]}` : null;
  const nextPath = nextIdx<wizardSteps.length ? `/signup/${wizardSteps[nextIdx]}` : '/login';
  return `
  <div class="wizard-wrap">
    <a class="wizard-brand" onclick="navigate('/signup/account')"><div class="mark">T</div><span>Trade Ledger</span></a>
    <div class="stepper">${stepperHtml}</div>
    <div class="wizard-card">
      <h2>${title}</h2>
      <p class="muted">${sub}</p>
      ${bodyHtml}
    </div>
    <div class="wizard-actions">
      <a class="btn" onclick="navigate('${prevPath || '/signup/account'}')" style="${!prevPath?'visibility:hidden':''}">← Back</a>
      <a class="btn primary" onclick="navigate('${nextPath}')">${idx===wizardSteps.length-1 ? 'Finish → Sign in' : 'Continue →'}</a>
    </div>
  </div>`;
}

function pageSignup(step){
  if(step==='account') return wizardChrome('account', `
    <div class="grid2">
      <div class="field"><label>Organization name</label><input value="MedCure Pharma Exports Pvt. Ltd."></div>
      <div class="field"><label>Organization type</label><select><option>Exporter</option><option>Buyer / Importer</option><option>Bank</option></select></div>
      <div class="field"><label>Country of registration</label><select><option>India</option><option>Japan</option><option>Other</option></select></div>
      <div class="field"><label>Primary industry</label><select><option>Pharmaceuticals</option><option>Textiles</option><option>Electronics</option></select></div>
      <div class="field"><label>Work email</label><input value="ops@medcurepharma.example"></div>
      <div class="field"><label>Registered tax / business ID</label><input value="27AAECM1234B1Z5"></div>
    </div>`, "Create your organization account", "The first screen any exporter, buyer, or bank sees before anything else in the platform.");

  if(step==='verify') return wizardChrome('verify', `
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:22px;">
      <div class="stamp"><span>Pending</span></div>

/* -------------------- Render / route match -------------------- */
function render(){
  let html = '';
  let m;

  if(m = path.match(/^\/signup\/(\w+)$/)) html = pageSignup(m[1]);
  else if(path === '/login') html = pageLogin();
  else if(path === '/dashboard') html = pageDashboard();
  else if(path === '/profile') html = pageProfile();
  else if(path === '/compliance') html = pageCompliance();
  else if(path === '/transactions') html = pageTransactions();
  else if(path === '/transactions/new') html = pageNewTransaction();
  else if(m = path.match(/^\/transactions\/([\w-]+)\/overview$/)) html = pageTxOverview(m[1]);
  else if(m = path.match(/^\/transactions\/([\w-]+)\/documents$/)) html = pageTxDocuments(m[1]);
  else if(m = path.match(/^\/transactions\/([\w-]+)\/compliance$/)) html = pageTxCompliance(m[1]);
  else if(m = path.match(/^\/transactions\/([\w-]+)\/bank-review$/)) html = pageTxBankReview(m[1]);
  else if(m = path.match(/^\/transactions\/([\w-]+)\/timeline$/)) html = pageTxTimeline(m[1]);
  else if(path === '/team') html = pageTeam();
  else html = pageSignup('account');

  document.getElementById('root').innerHTML = html;
}

render();
